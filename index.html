<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jorge Fatta</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='70' font-family='DM Sans' fill='%23000'>JF</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- Tipografía estilo Hermes -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap">
    
    <style>
        :root {
            /* Hermēs Homepage Palette */
            --bg-primary: #0a0a0b;
            --bg-secondary: #111113;
            --bg-tertiary: #1c1c1f;
            
            --text-primary: #fafafa;
            --text-secondary: #a1a1aa;
            --text-muted: #71717a;
            
            --border-primary: #27272a;
            --border-secondary: #3f3f46;
            --border-subtle: #52525b;
            
            --accent-primary: #71717a;
            --accent-secondary: #52525b;
            
            --surface-primary: #18181b;
            --surface-secondary: #27272a;
            
            /* Hermes Brand Colors */
            --hermes-black: #000000;
            --hermes-charcoal: #27272a;
            --hermes-slate: #52525b;
            --hermes-zinc: #71717a;
            --hermes-gray: #a1a1aa;
            --hermes-light: #f4f4f5;
            
            /* Animations */
            --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
            --ease-in: cubic-bezier(0.4, 0, 0.2, 1);
            --ease-in-out: cubic-bezier(0.4, 0, 0.2, 1);
            
            /* Shadows */
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -4px rgba(0, 0, 0, 0.1);
            --shadow-inner: inset 0 2px 4px 0 rgba(0, 0, 0, 0.05);
        }
        
        /* Dark theme (default) */
        :root[data-theme="system"] {
            --bg-primary: var(--bg-primary);
            --bg-secondary: var(--bg-secondary);
            --bg-tertiary: var(--bg-tertiary);
            --text-primary: var(--text-primary);
            --text-secondary: var(--text-secondary);
            --text-muted: var(--text-muted);
            --border-primary: var(--border-primary);
            --border-secondary: var(--border-secondary);
            --border-subtle: var(--border-subtle);
        }
        
        /* Light theme */
        :root[data-theme="light"] {
            --bg-primary: #ffffff;
            --bg-secondary: #f4f4f5;
            --bg-tertiary: #e4e4e7;
            --text-primary: #09090b;
            --text-secondary: #71717a;
            --text-muted: #a1a1aa;
            --border-primary: #e4e4e7;
            --border-secondary: #d4d4d8;
            --border-subtle: #f4f4f5;
            --accent-primary: #71717a;
            --accent-secondary: #52525b;
            --surface-primary: #ffffff;
            --surface-secondary: #f4f4f5;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            transition: background-color 0.3s var(--ease-in-out), color 0.3s var(--ease-in-out);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        
        .container {
            max-width: 640px;
            width: 100%;
            padding: 2rem;
            text-align: center;
        }
        
        /* Card - Hermes style */
        .card {
            background-color: var(--bg-primary);
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            padding: 3rem 2rem;
            box-shadow: var(--shadow-lg);
            transition: all 0.3s var(--ease-in-out);
            position: relative;
            overflow: hidden;
            opacity: 0;
            animation: fadeIn 0.6s var(--ease-out) forwards;
        }
        
        .card:hover {
            border-color: var(--border-secondary);
            box-shadow: var(--shadow-xl);
        }
        
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--border-subtle), transparent);
            opacity: 0.3;
        }
        
        /* Theme toggle */
        .theme-toggle {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: none;
            border: 1px solid var(--border-subtle);
            color: var(--text-muted);
            padding: 0.5rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s var(--ease-in-out);
            font-size: 1.25rem;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .theme-toggle:hover {
            background-color: var(--bg-tertiary);
            border-color: var(--border-secondary);
            color: var(--text-primary);
        }
        
        /* Typography */
        .greeting {
            font-size: 1rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            font-feature-settings: 'cv02', 'cv03', 'cv04';
        }
        
        .name {
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            letter-spacing: -0.02em;
            line-height: 1.1;
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--text-secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .title {
            font-size: 1.125rem;
            color: var(--text-secondary);
            margin-bottom: 2rem;
            font-weight: 400;
            line-height: 1.6;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }
        
        /* Social links - Hermes style */
        .social-links {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 2rem;
        }
        
        .social-link {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 500;
            padding: 0.625rem 1.125rem;
            border-radius: 9999px;
            transition: all 0.2s var(--ease-in-out);
            background: transparent;
            border: 1px solid transparent;
            font-size: 0.875rem;
        }
        
        .social-link:hover {
            color: var(--text-primary);
            background-color: var(--surface-secondary);
            border-color: var(--border-secondary);
            transform: translateY(-1px);
        }
        
        .social-link:active {
            transform: translateY(0);
        }
        
        /* DateTime - terminal style */
        .datetime {
            font-family: 'JetBrains Mono', 'SF Mono', Menlo, Monaco, monospace;
            font-size: 0.75rem;
            color: var(--text-muted);
            opacity: 0.7;
            font-weight: 400;
            padding: 1rem;
            background: var(--bg-tertiary);
            border-radius: 8px;
            border: 1px solid var(--border-secondary);
            display: inline-block;
            font-feature-settings: 'tnum', 'case', 'ss01';
        }
        
        /* Terminal prompt decoration */
        .card::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--hermes-zinc), transparent);
            transform: scaleX(0);
            transition: transform 1s var(--ease-in);
        }
        
        .card:hover::after {
            transform: scaleX(1);
        }
        
        /* Animations */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* Hover effects */
        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }
            
            .card {
                padding: 2rem 1.5rem;
            }
            
            .name {
                font-size: 2.5rem;
            }
            
            .social-links {
                gap: 0.75rem;
            }
            
            .social-link {
                padding: 0.5rem 0.875rem;
                font-size: 0.8125rem;
            }
            
            .datetime {
                font-size: 0.6875rem;
                padding: 0.75rem;
            }
        }
        
        /* Large screens */
        @media (min-width: 1024px) {
            .card {
                max-width: 640px;
                margin: 0 auto;
                padding: 4rem 3rem;
            }
            
            .name {
                font-size: 4rem;
            }
            
            .greeting {
                font-size: 1.125rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <!-- Theme toggle -->
            <button class="theme-toggle" id="theme-toggle" title="Cambiar tema">
                <span id="theme-icon">🌙</span>
            </button>
            
            <!-- Contenido principal (MISMO TEXTO) -->
            <div class="greeting">Hi, I'm</div>
            <div class="name">Jorge Fatta</div>
            <div class="title">platform engineering tech lead</div>
            
            <!-- Social links -->
            <div class="social-links">
                <a href="https://github.com/jfatta" target="_blank" class="social-link">GitHub</a>
                <a href="https://linkedin.com/in/jorgefatta" target="_blank" class="social-link">LinkedIn</a>
                <a href="https://x.com/jorgefatta_" target="_blank" class="social-link">X</a>
                <a href="mailto:hi@jorgefatta.dev" class="social-link">Email</a>
            </div>
            
            <!-- DateTime terminal -->
            <div class="datetime" id="datetime">Loading...</div>
        </div>
    </div>
    
    <script>
        // Theme toggle functionality
        const themeToggle = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');
        const currentTheme = localStorage.getItem('theme') || 'system';
        
        // Set initial theme
        document.documentElement.setAttribute('data-theme', currentTheme);
        updateThemeIcon(currentTheme);
        
        themeToggle.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            let newTheme;
            
            if (currentTheme === 'dark') {
                newTheme = 'light';
            } else if (currentTheme === 'light') {
                newTheme = 'system';
            } else {
                newTheme = 'dark';
            }
            
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeIcon(newTheme);
        });
        
        function updateThemeIcon(theme) {
            switch(theme) {
                case 'dark':
                    themeIcon.textContent = '🌙';
                    break;
                case 'light':
                    themeIcon.textContent = '☀️';
                    break;
                case 'system':
                    themeIcon.textContent = '⚙️';
                    break;
            }
        }
        
        // Update datetime
        function updateDateTime() {
            const now = new Date();
            const options = {
                weekday: 'short',
                month: 'short',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                hour12: false
            };
            document.getElementById('datetime').textContent = now.toLocaleDateString('es-ES', options) + ', ' + now.toLocaleTimeString('es-ES', {hour12: false});
        }
        
        updateDateTime();
        setInterval(updateDateTime, 1000);
    </script>
</body>
</html>
